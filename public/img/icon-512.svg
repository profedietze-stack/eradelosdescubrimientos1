  <path d="M50 320 L462 320" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
  <path d="M30 350 Q128 330 256 350 Q384 370 482 340" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
