  <rect width="512" height="512" rx="48" fill="url(#bg)"/>
  <!-- Casco -->
  <path d="M80 320 L120 220 L392 220 L432 320 Z" fill="url(#hull)" stroke="#2a1508" stroke-width="4"/>
