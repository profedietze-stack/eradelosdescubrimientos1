      <stop offset="0%" stop-color="#1a3d5f"/>
      <stop offset="100%" stop-color="#0d1f2e"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5c3317"/>
      <stop offset="100%" stop-color="#3d1f08"/>
    </linearGradient>
    <linearGradient id="sail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#d4b88c"/>
